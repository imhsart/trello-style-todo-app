<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trello Style Todo App</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <!-- header section -->
  <div class="header-navbar">
    <div class="header-left-section">
      LOGOLOGOGO
    </div>
    <div class="header-middle-section">
      <div class="search-bar-section">
        <div class="search-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="16.65" y1="16.65" x2="20" y2="20"></line>
        </svg>
        </div>
        <input id="search-bar-input" placeholder="Search...">
      </div>
    </div>
    <div class="header-right-section">
      <div class="notification">
        <button class="notification-button">
          <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24" focusable="false" aria-hidden="true" fill="rgb(155, 152, 152)">
            <path d="M16 19a4 4 0 11-8 0H4.765C3.21 19 2.25 17.304 3.05 15.97l1.806-3.01A1 1 0 005 12.446V8a7 7 0 0114 0v4.446c0 .181.05.36.142.515l1.807 3.01c.8 1.333-.161 3.029-1.716 3.029H16ZM12 3a5 5 0 00-5 5v4.446a3 3 0 01-.428 1.543L4.765 17h14.468l-1.805-3.01A3 3 0 0117 12.445V8a5 5 0 00-5-5Zm-2 16a2 2 0 104 0h-4Z"></path>
          </svg>
        </button>
      </div>
      <div class="user-profile">
        <img id="user-profile" src="https://tse3.mm.bing.net/th/id/OIP.y5IvuvOf-wm4B5YXzo2KqAHaE8?pid=Api&P=0&h=180" alt="hamster">
        <div class="activity-status">
        </div>
      </div>
    </div>
  </div>

  <!-- contact section -->
   <div class="contact-section">
    <a href="#">About</a>
    <span>/</span>
    <a href="#">Contact</a>
   </div>

   <!-- todo section -->
    <div class="todo-container">
      <div class="add-button-section">
        <button>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          Add Todo</button>
      </div>
      <div class="todos-section">
        <div class="column-holder">
          <div class="todo-column">
            <div class="heading-section">
              To Do
            </div>
            <div class="task-section">
              Add task to get started!
            </div>
          </div>
          <div class="in-progress-column">
            <div class="heading-section">
              In Progress
            </div>
            <div class="task-section">
              Add task to get started!
            </div>
          </div>
          <div class="done-column">
            <div class="heading-section">
              Done
            </div>
            <div class="task-section">
              Add task to get started!
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
